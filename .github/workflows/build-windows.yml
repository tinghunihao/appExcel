name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    strategy:
      matrix:
        include:
          - artifact-name: windows-x64-exe
            exe-name: 门店Excel智能处理工具
            architecture: x64
            python-version: "3.8"
          - artifact-name: windows-x86-exe
            exe-name: store_excel_tool_x86
            architecture: x86
            python-version: "3.8"

    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller==5.13.2

      - name: Build EXE
        run: |
          python -m PyInstaller --onefile --windowed --name "${{ matrix.exe-name }}" app\main.py
          if ("${{ matrix.architecture }}" -eq "x86") {
            python -m PyInstaller --onefile --console --name "store_excel_tool_x86_cli" app\main_cli.py
            "@echo off" | Out-File -Encoding ascii "dist\run_x86_cli.bat"
            "cd /d %~dp0" | Out-File -Encoding ascii -Append "dist\run_x86_cli.bat"
            "store_excel_tool_x86_cli.exe" | Out-File -Encoding ascii -Append "dist\run_x86_cli.bat"
            "echo." | Out-File -Encoding ascii -Append "dist\run_x86_cli.bat"
            "echo If there is an error, send compat_error.log or the window text to support." | Out-File -Encoding ascii -Append "dist\run_x86_cli.bat"
            "pause" | Out-File -Encoding ascii -Append "dist\run_x86_cli.bat"
          }

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            dist/${{ matrix.exe-name }}.exe
            dist/store_excel_tool_x86_cli.exe
            dist/run_x86_cli.bat
